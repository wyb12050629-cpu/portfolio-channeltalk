<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — WANGYUBIN</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --bg:#050505; --bg2:#080808;
      --accent:#6D32FF; --electric:#00CCFF;
      --white:#fff; --dim:#555; --dim2:#888;
      --border:rgba(255,255,255,.06); --card:rgba(255,255,255,.02);
      --font:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      --grad:linear-gradient(45deg,var(--accent),var(--electric));
    }
    *{margin:0;padding:0;box-sizing:border-box} html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--white);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-weight:300}

    nav{position:fixed;top:0;width:100%;height:60px;padding:0 6%;display:flex;justify-content:space-between;align-items:center;z-index:1000;background:rgba(5,5,5,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .logo{font-weight:200;font-size:.85rem;letter-spacing:6px;color:rgba(255,255,255,.9);text-decoration:none;text-transform:uppercase}
    nav ul{display:flex;list-style:none;gap:2.5rem}
    nav ul li a{text-decoration:none;color:var(--dim2);font-size:.7rem;font-weight:300;text-transform:uppercase;letter-spacing:2.5px;transition:color .3s}
    nav ul li a:hover,nav ul li a.active{color:var(--white)}

    /* HERO */
    .page-hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:120px 6%;border-bottom:1px solid var(--border)}
    .ph-label{font-size:.6rem;font-weight:300;color:var(--dim2);text-transform:uppercase;letter-spacing:4px;margin-bottom:1.5rem}
    .ph-title{font-size:clamp(2.2rem,6vw,5rem);font-weight:200;line-height:1.1;letter-spacing:-1.5px;margin-bottom:2rem}
    .ph-title .hl{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .ph-sub{font-size:.85rem;font-weight:300;color:var(--dim2);max-width:440px;line-height:2;margin-bottom:4rem}

    /* CONTACT LIST */
    .contact-list{display:flex;flex-direction:column;gap:1px;border:1px solid var(--border);max-width:560px}
    .c-row{display:flex;align-items:center;gap:2rem;padding:1.4rem 1.8rem;background:var(--card);text-decoration:none;color:inherit;transition:background .3s}
    .c-row:hover{background:rgba(255,255,255,.04)}
    .c-label{font-size:.6rem;font-weight:300;color:var(--dim2);text-transform:uppercase;letter-spacing:2.5px;width:60px;flex-shrink:0}
    .c-val{font-size:.85rem;font-weight:300;color:rgba(255,255,255,.9)}

    .btn-apply{display:inline-block;margin-top:3rem;padding:.7rem 2rem;border:1px solid rgba(109,50,255,.35);color:rgba(255,255,255,.8);font-weight:300;font-size:.72rem;letter-spacing:2px;text-decoration:none;text-transform:uppercase;transition:all .3s}
    .btn-apply:hover{background:rgba(109,50,255,.12);border-color:rgba(109,50,255,.55);color:var(--white)}

    footer{padding:2rem 6%;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;color:var(--dim2);font-size:.65rem;font-weight:300;letter-spacing:1.5px}
    .foot-r a{color:var(--dim2);text-decoration:none;margin-left:2rem;transition:color .3s;text-transform:uppercase;letter-spacing:1.5px}
    .foot-r a:hover{color:var(--white)}

    @media(max-width:900px){nav ul{display:none}}
  </style>
</head>
<body>

    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<div class="page-hero">
  <div class="ph-label">Contact</div>
  <h1 class="ph-title">채널톡 <span class="hl">AI Sales</span><br>에 지원합니다</h1>
  <p class="ph-sub">콜로 고객의 AI 전환을 직접 만들어내는<br>공격적인 세일즈를 함께 수행하겠습니다.</p>

  <div class="contact-list">

      <span class="c-label">Email</span>
      <span class="c-val">yubinlili125@gmail.com</span>
    </a>
    <a href="tel:010-5782-5584" class="c-row">
      <span class="c-label">Phone</span>
      <span class="c-val">010-5782-5584</span>
    </a>
  </div>

</div>

<footer>
  <span>© 2026 WANGYUBIN · Be Better with AI</span>
  <div class="foot-r">
    <a href="portfolio_3d.html">Home</a>
    <a href="about.html">About</a>
    <a href="projects.html">Projects</a>
  </div>
</footer>
</body>
</html>
